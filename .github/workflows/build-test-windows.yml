name: Build and Test Suite on Windows

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-tests:
    name: Test and Build
    strategy:
      matrix:
        platform:
          - windows-latest
        toolchain:
          - stable
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Build tests
        run: cargo test --locked --all --release --features "json-tests" --verbose --no-run
