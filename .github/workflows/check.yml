name: Check

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo check 1/3
        run: cargo check --locked --no-default-features --verbose

      - name: Run cargo check 2/3
        run: cargo check --locked --manifest-path crates/runtime/io/Cargo.toml --no-default-features --verbose

      - name: Run cargo check 3/3
        run: cargo check --locked --manifest-path crates/runtime/io/Cargo.toml --features "mio" --verbose

      - name: Run cargo check evmbin
        run: cargo check --locked -p evmbin --verbose

      - name: Run cargo check benches
        run: cargo check --locked --all --benches --verbose

      - name: Run validate chainspecs
        run: ./scripts/actions/validate-chainspecs.sh
