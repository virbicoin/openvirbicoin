name: Release ovbc binaries

# Build the openvirbicoin (ovbc) client and publish the binaries to a GitHub
# Release whenever a version tag is pushed. Users can then download a prebuilt
# binary from the Releases page and run it with no arguments to join the
# VirBiCoin network.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# Some bundled C/C++ dependencies (e.g. the snappy CMakeLists used by
# parity-snappy-sys) still declare cmake_minimum_required below 3.5, which
# modern CMake refuses by default. Allow them to configure anyway.
env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: ovbc-linux-x86_64.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: ovbc-macos-x86_64.tar.gz
          # aarch64-apple-darwin is intentionally omitted: OpenEthereum's pinned
          # ring 0.14 has no Apple Silicon assembly and fails to build there.
          # Apple Silicon users can run the x86_64 macOS binary via Rosetta 2.
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: ovbc-windows-x86_64.zip
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust 1.75.0
        uses: dtolnay/rust-toolchain@1.75.0
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev cmake clang libclang-dev pkg-config

      # cmake 0.1.46 detects VS2022 but doesn't know its generator name. Tell it
      # explicitly via CMAKE_GENERATOR so it skips its own (incomplete) probing
      # and lets the system CMake (which fully supports VS2022) configure snappy.
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Select CMake generator (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> "$GITHUB_ENV"
          echo "CMAKE_GENERATOR_PLATFORM=x64" >> "$GITHUB_ENV"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build ovbc
        run: cargo build --release --bin ovbc --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -czf "dist/${{ matrix.archive }}" -C "target/${{ matrix.target }}/release" ovbc
          ( cd dist && shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256" )

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          ( cd "target/${{ matrix.target }}/release" && 7z a "../../../dist/${{ matrix.archive }}" ovbc.exe )
          ( cd dist && certutil -hashfile "${{ matrix.archive }}" SHA256 > "${{ matrix.archive }}.sha256" )

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/*

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          # Mark pre-release tags (anything with a hyphen, e.g. v3.3.5-vbc1) as
          # a GitHub pre-release; plain version tags (v3.3.5) publish normally.
          prerelease: ${{ contains(github.ref_name, '-') }}
