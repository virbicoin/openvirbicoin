name: Release ovbc binaries

# Build the open-virbicoin (ovbc) client and publish the binaries to a GitHub
# Release whenever a version tag is pushed. Users can then download a prebuilt
# binary from the Releases page and run it with no arguments to join the
# VirBiCoin network.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: ovbc-linux-x86_64.tar.gz
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            archive: ovbc-linux-aarch64.tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: ovbc-windows-x86_64.zip
          # macOS is temporarily omitted: the pinned ring 0.14 has no Apple
          # Silicon assembly and the x86_64 build needs further toolchain work.
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust 1.75.0
        uses: dtolnay/rust-toolchain@1.75.0
        with:
          targets: ${{ matrix.target }}

      # Pin a stable CMake. CMake 3.31 (current on the runners) rejects the old
      # RocksDB/snappy projects: its internal try_compile uses a set() form that
      # errors under cmake_minimum_required(3.5). 3.29 builds them fine.
      - name: Install CMake 3.29
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.29.6"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev clang libclang-dev pkg-config

      # cmake 0.1.46 detects VS2022 but doesn't know its generator name. Tell it
      # explicitly via CMAKE_GENERATOR so it skips its own (incomplete) probing
      # and lets the system CMake (which fully supports VS2022) configure snappy.
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Select CMake generator (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> "$GITHUB_ENV"
          echo "CMAKE_GENERATOR_PLATFORM=x64" >> "$GITHUB_ENV"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      # Stable releases (plain tags like v3.3.5) flip the version track to
      # "stable" via the `final` feature, so the published binaries report
      # "Ovbc/vX.Y.Z-stable/...". Pre-release tags (e.g. v3.3.5-rc1) and manual
      # runs stay "unstable".
      - name: Select build features
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" != *-* ]]; then
            echo "OVBC_FEATURES=--features final" >> "$GITHUB_ENV"
          else
            echo "OVBC_FEATURES=" >> "$GITHUB_ENV"
          fi

      - name: Build ovbc
        run: cargo build --release --bin ovbc --target ${{ matrix.target }} ${{ env.OVBC_FEATURES }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -czf "dist/${{ matrix.archive }}" -C "target/${{ matrix.target }}/release" ovbc
          ( cd dist && shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256" )

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          ( cd "target/${{ matrix.target }}/release" && 7z a "../../../dist/${{ matrix.archive }}" ovbc.exe )
          ( cd dist && certutil -hashfile "${{ matrix.archive }}" SHA256 > "${{ matrix.archive }}.sha256" )

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/*

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          # Mark pre-release tags (anything with a hyphen, e.g. v3.3.5-vbc1) as
          # a GitHub pre-release; plain version tags (v3.3.5) publish normally.
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Create the release as a draft so assets can be attached first. This
          # repository uses immutable releases, which reject asset uploads after
          # a release is published; publish the draft manually once it's ready.
          draft: true
